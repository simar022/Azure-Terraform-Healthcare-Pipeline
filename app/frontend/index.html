<!DOCTYPE html>
<html>
<body>
    <h1>Healthcare Dashboard</h1>
    <div id="data">Loading system status...</div>
    <script>
        // Use the same hostname (ALB IP) but point to the Backend NodePort
        const apiHost = window.location.hostname;
        fetch(`http://${apiHost}:31000/api/status`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('data').innerText = data.status;
            })
            .catch(err => console.error("API Unreachable", err));
    </script>
</body>
</html>
