<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync | Professional Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-indicator { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .bg-online { background-color: #2ecc71; }
        .bg-offline { background-color: #e74c3c; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3">
    <h3 class="mb-4"><i class="fas fa-heartbeat me-2"></i>HealthSync</h3>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item"><a href="#" class="nav-link active"><i class="fas fa-home me-2"></i>Dashboard</a></li>
        <li><a href="#" class="nav-link text-white"><i class="fas fa-user-injured me-2"></i>Patients</a></li>
        <li><a href="#" class="nav-link text-white"><i class="fas fa-calendar-check me-2"></i>Appointments</a></li>
    </ul>
    <hr>
    <div class="small">
        <span id="system-status-dot" class="status-indicator bg-offline"></span>
        System: <span id="system-status-text">Connecting...</span>
    </div>
</div>

<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Hospital Management Overview</h2>
        <button class="btn btn-primary" onclick="loadDashboardData()"><i class="fas fa-sync me-2"></i>Refresh Data</button>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card p-3 bg-white text-dark">
                <h5>Total Patients</h5>
                <h2 id="count-patients">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 bg-white text-dark">
                <h5>Critical Cases</h5>
                <h2 class="text-danger" id="count-critical">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 bg-white text-dark">
                <h5>Active Appointments</h5>
                <h2>12</h2>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-white">
            <h5 class="mb-0">Recent Patient Entries (Live from DB)</h5>
        </div>
        <div class="table-responsive p-3">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Patient Name</th>
                        <th>Condition</th>
                        <th>Admitted At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="patient-table-body">
                    <tr><td colspan="5" class="text-center">Loading database records...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const ALB_IP = window.location.hostname;
    const API_BASE = `http://${ALB_IP}:31000/api`;

    async function loadDashboardData() {
        try {
            const response = await fetch(`${API_BASE}/patients`);
            const patients = await response.json();
            
            const tableBody = document.getElementById('patient-table-body');
            tableBody.innerHTML = '';
            
            let criticalCount = 0;

            patients.forEach(p => {
                if(p.condition.toLowerCase() === 'critical') criticalCount++;
                tableBody.innerHTML += `
                    <tr>
                        <td>#${p.id}</td>
                        <td><strong>${p.name}</strong></td>
                        <td><span class="badge ${p.condition === 'Critical' ? 'bg-danger' : 'bg-success'}">${p.condition}</span></td>
                        <td>${new Date(p.admitted_at).toLocaleString()}</td>
                        <td><button class="btn btn-sm btn-outline-primary">View File</button></td>
                    </tr>
                `;
            });

            document.getElementById('count-patients').innerText = patients.length;
            document.getElementById('count-critical').innerText = criticalCount;
            document.getElementById('system-status-dot').className = 'status-indicator bg-online';
            document.getElementById('system-status-text').innerText = 'Online';

        } catch (err) {
            console.error("Fetch error:", err);
            document.getElementById('system-status-text').innerText = 'Backend Unreachable';
        }
    }

    window.onload = loadDashboardData;
</script>
</body>
</html>
