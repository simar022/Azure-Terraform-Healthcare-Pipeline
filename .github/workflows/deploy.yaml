name: Healthcare CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/new-healthcare-backend:latest ./app/backend
          docker push ${{ secrets.DOCKER_USERNAME }}/new-healthcare-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/new-healthcare-frontend:latest ./app/frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/new-healthcare-frontend:latest

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/new-healthcare-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/new-healthcare-frontend:latest

            minikube kubectl -- rollout restart deployment/healthcare-app
            minikube kubectl -- rollout status deployment/healthcare-app
