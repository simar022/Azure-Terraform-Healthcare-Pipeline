apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthcare
  template:
    metadata:
      labels:
        app: healthcare
    spec:
      containers:
      - name: backend
        image: simarjitsingh22/new-healthcare-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DB_URL
          value: "postgresql://dbuser:securepass@postgres-service:5432/healthcare"
      - name: frontend
        image: simarjitsingh22/new-healthcare-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: healthcare-svc
spec:
  type: NodePort
  selector:
    app: healthcare
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32000
    - name: api
      port: 5000
      targetPort: 5000
      nodePort: 31000